name: Dump Scorigami Static Data

on:
  workflow_dispatch:
  # Backend workflow fires this immediately after its DB refresh completes —
  # way more reliable than cron-on-cron.
  repository_dispatch:
    types: [backend-completed]
  schedule:
    # Safety net only — runs daily in case the repository_dispatch ever fails.
    - cron: '13 14 * * *'

permissions:
  contents: write

jobs:
  dump:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Dump materialized views to JSON
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: node scripts/dump-scorigami-data.js

      - name: Regenerate OG image from fresh data
        run: node scripts/generate-og-image.js

      - name: Commit and push if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/scorigami-data public/og.png public/og-archive.png public/mlb-scorigami-heatmap.png
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: refresh scorigami static data [skip ci]"
            git push
          fi
